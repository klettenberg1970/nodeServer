name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-check:
    name: Dependencies installieren
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Dependencies installieren
        run: npm ci

  docker-build:
    name: Docker Image bauen & pushen
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Google Cloud authentifizieren
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3
      - name: Docker für Artifact Registry konfigurieren
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet
      - name: Docker Image bauen & pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: europe-west3-docker.pkg.dev/nodeserver-499408/nodeserver/nodeserver:latest

  deploy:
    name: Deploy auf Google Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    steps:
      - name: Google Cloud authentifizieren
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: gcloud einrichten
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy auf Cloud Run
        run: |
          gcloud run deploy nodeserver \
            --image europe-west3-docker.pkg.dev/nodeserver-499408/nodeserver/nodeserver:latest \
            --region europe-west3 \
            --platform managed \
            --allow-unauthenticated