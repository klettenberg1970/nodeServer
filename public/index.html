<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      background-color: aquamarine;
    }
    button{
      background-color: black;
      color:white;
      border:none;
      border-radius:8px;
      padding: 1rem 2rem;
    }
  </style>
  <title>Document</title>
</head>
<body>

  <button onclick="laden()">Daten laden</button>
  <p id="ausgabe"></p>


  <script>
    async function laden() {
      const res = await fetch('/api/v1/fotos/ordner');
      const data = await res.json();
      console.log(data)
      document.getElementById('ausgabe').textContent = data;
    }
  </script>
</body>
</html>
