<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      background-color: aquamarine;
    }
  </style>
  <title>Document</title>
</head>
<body>

  <button onclick="laden()">Daten laden</button>
  <p id="ausgabe"></p>


  <script>
    async function laden() {
      const res = await fetch('/api/v1/rss/all');
      const data = await res.json();
      console.log(data)
      document.getElementById('ausgabe').textContent = data;
    }
  </script>
</body>
</html>
